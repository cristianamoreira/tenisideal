name: Preços via Feed Awin (teste)

on:
  workflow_dispatch:

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ler feed da Awin e casar com o catálogo
        env:
          AWIN_FEED_URL: ${{ secrets.AWIN_FEED_URL }}
        run: python3 precos_awin_feed.py
