name: 🔄 Atualizar Preços Diariamente

on:
  schedule:
    # Roda todo dia às 10:00 AM (horário UTC)
    # Para mudar o horário, veja: https://crontab.guru/
    - cron: '0 10 * * *'

  # Permite rodar manualmente via GitHub
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth-oauthlib google-auth-httplib2 google-generativeai beautifulsoup4 requests

      - name: 🔑 Configurar credenciais Google
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credenciais.json
          echo "✅ Credenciais salvas em credenciais.json"

      - name: 🕷️ Executar scraper automático
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper_automatico.py

      - name: 📤 Commit das mudanças
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "🔄 Atualizar preços - $(date +'%Y-%m-%d %H:%M:%S')"
          git push

      - name: 📧 Notificar sucesso
        if: success()
        run: echo "✅ Preços atualizados com sucesso!"

      - name: ⚠️ Notificar erro
        if: failure()
        run: echo "❌ Erro ao atualizar preços. Verifique os logs."
