name: Cupons e ofertas diárias

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 08:00 BRT (todo dia de manhã)
  workflow_dispatch:        # botão para rodar manualmente (teste)

jobs:
  gerar-cupons:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerar a mensagem de cupons + ofertas
        env:
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
          AWIN_PUBLISHER_ID: '2800712'
        run: python3 gerar_cupons_awin.py

      - name: Enviar a mensagem por e-mail (Brevo)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_CUPONS: ${{ secrets.EMAIL_CUPONS }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        run: python3 enviar_cupons_email.py

      - name: Disponibilizar a mensagem para download (backup)
        uses: actions/upload-artifact@v4
        with:
          name: cupons-do-dia
          path: cupons_hoje.txt
          retention-days: 7
