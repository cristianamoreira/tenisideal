name: Arte Instagram (Destaque do dia)

on:
  schedule:
    - cron: '30 11 * * *'   # todo dia 08:30 BRT
  workflow_dispatch:
    inputs:
      formato:
        description: 'Formato p/ testar (vazio = o do dia): destaque, comparativo, sonhos, cupom'
        required: false
        default: ''

jobs:
  arte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Pillow
        run: pip install Pillow

      - name: Instalar o Chrome (para renderizar a arte)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Gerar a arte e enviar por e-mail
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_CUPONS: ${{ secrets.EMAIL_CUPONS }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          AWIN_API_TOKEN: ${{ secrets.AWIN_API_TOKEN }}
          AWIN_PUBLISHER_ID: '2800712'
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          FORMATO_ARTE: ${{ github.event.inputs.formato }}
        run: python3 gerar_arte_instagram.py

      - name: Guardar as artes (backup p/ download)
        uses: actions/upload-artifact@v4
        with:
          name: artes-instagram
          path: arte_*.png
          retention-days: 7
          if-no-files-found: ignore
