name: Atualizar site com a planilha (diário)

on:
  schedule:
    - cron: '0 11 * * *'   # todo dia 08:00 BRT
  workflow_dispatch:        # botão para rodar na hora

permissions:
  contents: write           # necessário para publicar as mudanças

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install gspread google-auth requests

      - name: Criar credenciais da planilha (do secret)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > credenciais.json

      - name: Ler a planilha e gerar os dados do site
        run: python3 fetch_shoes_from_sheets.py

      - name: Publicar no site se algo mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain frontend/shoes_data.js shoes-fallback.json)" ]; then
            git add frontend/shoes_data.js shoes-fallback.json
            git commit -m "Atualiza dados do site a partir da planilha (automático)"
            git push
            echo "✅ Site atualizado com os dados da planilha."
          else
            echo "ℹ️ Nenhuma mudança nos dados hoje — nada a publicar."
          fi
